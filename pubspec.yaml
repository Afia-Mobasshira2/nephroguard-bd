name: nephro_guard_bd
description: A Material 3 Flutter application for predicting diabetic nephropathy risk with a microalbuminuria focus, designed for rural Bangladesh clinics.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.7.2 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  provider: ^6.1.5
  go_router: ^16.0.0
  flutter_screenutil: ^5.9.3
  google_fonts: ^6.3.1
  flutter_svg: ^2.2.0
  percent_indicator: ^4.2.5
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/