name: nephro_guard_bd
description: A Material 3 Flutter application for predicting diabetic nephropathy risk with a microalbuminuria focus, designed for rural Bangladesh clinics.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: "3.8.0-171.0.dev"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.5

  # Navigation
  go_router: ^16.0.0

  # Responsive UI
  flutter_screenutil: ^5.9.3

  # Fonts
  google_fonts: ^6.3.1

  # SVG Icons
  flutter_svg: ^2.2.0

  # Progress Indicator
  percent_indicator: ^4.2.5

  # Date Formatting
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true